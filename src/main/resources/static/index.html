<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SAC-Plus - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="login-container">
    <h2>VALIDACIÓN DE USUARIO</h2>

    <div class="input-group">
        <label>Usuario:</label>
        <input type="text" id="usuario" placeholder="Ingrese usuario">
    </div>

    <div class="input-group">
        <label>Contraseña:</label>
        <input type="password" id="password" placeholder="Ingrese contraseña">
    </div>

    <button type="button" class="btn-login" onclick="irDashboard()">Ingresar</button>
</div>

<script src="js/script.js"></script>
</body>
</html>
